<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EcoMonitor Pro</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --green: #22c55e;
            --blue: #3b82f6;
            --red: #ef4444;
            --text: #f8fafc;
        }

        body {
            margin: 0;
            background: var(--bg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--text);
            overflow: hidden; /* Prevents scrolling during filming */
            user-select: none;
        }

        .app-container {
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            height: 100vh;
            box-sizing: border-box;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #334155;
            padding-bottom: 15px;
        }

        h1 { font-size: 0.9rem; letter-spacing: 2px; opacity: 0.6; margin: 0; }
        .live-indicator { color: var(--green); font-size: 0.8rem; font-weight: bold; display: flex; align-items: center; gap: 5px; }
        .dot { height: 8px; width: 8px; background: var(--green); border-radius: 50%; animation: pulse 1.5s infinite; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .card {
            background: var(--card);
            padding: 20px;
            border-radius: 24px;
            border: 1px solid #334155;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }

        .meter-label { display: flex; justify-content: space-between; margin-bottom: 12px; font-weight: 600; font-size: 1.1rem; }
        .track { background: #0f172a; height: 16px; border-radius: 8px; overflow: hidden; border: 1px solid #334155; }
        .fill { height: 100%; width: 0%; transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1); }

        #waste-fill { background: var(--blue); width: 32%; }
        #energy-fill { background: var(--green); width: 18%; }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .mini-card { background: var(--card); padding: 18px; border-radius: 20px; text-align: center; border: 1px solid #334155; }
        .value { font-size: 1.6rem; font-weight: 800; display: block; margin-top: 5px; }
        .unit { font-size: 0.7rem; opacity: 0.5; font-weight: bold; letter-spacing: 1px; }

        /* Cinematic Alert Overlay */
        #alert-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(239, 68, 68, 0.2);
            display: none;
            pointer-events: none;
            z-index: 100;
            border: 10px solid var(--red);
            box-sizing: border-box;
            animation: flash 0.6s infinite;
        }

        @keyframes flash { 0% { opacity: 0.2; } 50% { opacity: 0.8; } 100% { opacity: 0.2; } }

        .alert-text {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: var(--red);
            color: white;
            padding: 10px 20px;
            font-weight: bold;
            border-radius: 8px;
            font-size: 1.2rem;
            box-shadow: 0 0 30px rgba(239, 68, 68, 0.8);
        }
    </style>
</head>
<body>

    <div id="alert-overlay"><div class="alert-text">SYSTEM OVERLOAD</div></div>

    <div class="app-container">
        <div class="header">
            <h1>SYSTEM MONITOR</h1>
            <div class="live-indicator"><div class="dot"></div> LIVE</div>
        </div>
        
        <div class="card">
            <div class="meter-label"><span>Waste Level</span> <span id="waste-val">32%</span></div>
            <div class="track"><div id="waste-fill" class="fill"></div></div>
        </div>

        <div class="card">
            <div class="meter-label"><span>Energy Load</span> <span id="energy-val">1.4kW</span></div>
            <div class="track"><div id="energy-fill" class="fill"></div></div>
        </div>

        <div class="stat-grid">
            <div class="mini-card"><span class="unit">VOLTAGE</span><span class="value" id="volt-val">230V</span></div>
            <div class="mini-card"><span class="unit">TEMP</span><span class="value">24°C</span></div>
        </div>

        <div style="margin-top: auto; text-align: center; opacity: 0.4; font-size: 0.7rem;">
            ENCRYPTED CONNECTION: AES-256<br>
            STATION ID: GREEN-TECH-01
        </div>
    </div>

    <script>
        const wasteFill = document.getElementById('waste-fill');
        const wasteText = document.getElementById('waste-val');
        const energyFill = document.getElementById('energy-fill');
        const energyText = document.getElementById('energy-val');
        const voltText = document.getElementById('volt-val');
        const overlay = document.getElementById('alert-overlay');

        function triggerAlert() {
            wasteFill.style.width = '94%';
            wasteFill.style.backgroundColor = 'var(--red)';
            wasteText.innerText = '94%';
            wasteText.style.color = 'var(--red)';
            
            energyFill.style.width = '88%';
            energyFill.style.backgroundColor = 'var(--red)';
            energyText.innerText = '8.2kW';
            energyText.style.color = 'var(--red)';
            
            voltText.innerText = '410V';
            voltText.style.color = 'var(--red)';
            
            overlay.style.display = 'block';
        }

        function resetLevels() {
            wasteFill.style.width = '32%';
            wasteFill.style.backgroundColor = 'var(--blue)';
            wasteText.innerText = '32%';
            wasteText.style.color = 'white';
            
            energyFill.style.width = '18%';
            energyFill.style.backgroundColor = 'var(--green)';
            energyText.innerText = '1.4kW';
            energyText.style.color = 'white';
            
            voltText.innerText = '230V';
            voltText.style.color = 'white';
            
            overlay.style.display = 'none';
        }

        // FILM CUES
        // Tap TOP half of screen to TRIGGER ALERT
        // Tap BOTTOM half of screen to RESET
        document.addEventListener('click', (e) => {
            if (e.clientY < window.innerHeight / 2) {
                triggerAlert();
            } else {
                resetLevels();
            }
        });

        // Key shortcuts for off-camera control
        document.addEventListener('keydown', (e) => {
            if (e.key === 'a' || e.key === 'A') triggerAlert();
            if (e.key === 'r' || e.key === 'R') resetLevels();
        });
    </script>
</body>
</html>
